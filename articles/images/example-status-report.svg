<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <rect width="900" height="400" fill="#0E1512"/>

  <text x="40" y="42" fill="#E8EDE9" font-size="17" font-weight="700">Example status-reporter output</text>
  <text x="40" y="64" fill="#E0B24D" font-size="12">illustrative — representative shape of an early execution run, not real figures</text>

  <!-- Execution completion badge (highlighted) -->
  <rect x="680" y="24" width="180" height="52" rx="8" fill="#16362B" stroke="#4FD8A0" stroke-width="1.5"/>
  <text x="770" y="46" fill="#9AAAA1" font-size="10" text-anchor="middle" letter-spacing="0.05em">EXECUTION COMPLETION</text>
  <text x="770" y="68" fill="#4FD8A0" font-size="20" font-weight="700" text-anchor="middle">~12%</text>

  <!-- axis -->
  <line x1="90" y1="350" x2="860" y2="350" stroke="#2A3833" stroke-width="1.5"/>

  <!-- gridlines -->
  <line x1="90" y1="280" x2="860" y2="280" stroke="#1c2622" stroke-width="1"/>
  <line x1="90" y1="210" x2="860" y2="210" stroke="#1c2622" stroke-width="1"/>
  <line x1="90" y1="140" x2="860" y2="140" stroke="#1c2622" stroke-width="1"/>
  <line x1="90" y1="90" x2="860" y2="90" stroke="#1c2622" stroke-width="1"/>

  <!-- bars: Total, Passed, Failed, Not Testable, No Run -->
  <rect x="120" y="95" width="100" height="255" rx="4" fill="#64857A"/>
  <text x="170" y="85" fill="#E8EDE9" font-size="14" text-anchor="middle" font-weight="700">~130</text>
  <text x="170" y="375" fill="#9AAAA1" font-size="12" text-anchor="middle">Total Test</text>
  <text x="170" y="390" fill="#9AAAA1" font-size="12" text-anchor="middle">Cases</text>

  <rect x="270" y="315" width="100" height="35" rx="4" fill="#4FD8A0"/>
  <text x="320" y="305" fill="#E8EDE9" font-size="14" text-anchor="middle" font-weight="700">~15</text>
  <text x="320" y="375" fill="#9AAAA1" font-size="12" text-anchor="middle">Passed</text>

  <rect x="420" y="330" width="100" height="20" rx="4" fill="#E0574F"/>
  <text x="470" y="320" fill="#E8EDE9" font-size="14" text-anchor="middle" font-weight="700">~7</text>
  <text x="470" y="375" fill="#9AAAA1" font-size="12" text-anchor="middle">Failed</text>

  <rect x="570" y="332" width="100" height="18" rx="4" fill="#E0B24D"/>
  <text x="620" y="322" fill="#E8EDE9" font-size="14" text-anchor="middle" font-weight="700">~6</text>
  <text x="620" y="375" fill="#9AAAA1" font-size="12" text-anchor="middle">Not Testable</text>

  <rect x="720" y="140" width="100" height="210" rx="4" fill="#2A3833" stroke="#64857A" stroke-width="1"/>
  <text x="770" y="130" fill="#E8EDE9" font-size="14" text-anchor="middle" font-weight="700">~100</text>
  <text x="770" y="375" fill="#9AAAA1" font-size="12" text-anchor="middle">No Run</text>
  <text x="770" y="390" fill="#9AAAA1" font-size="12" text-anchor="middle">(yet)</text>

</svg>
