<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <rect width="1000" height="580" fill="#0E1512"/>

  <!-- trigger badges -->
  <rect x="30" y="30" width="230" height="46" rx="6" fill="#16362B" stroke="#4FD8A0" stroke-width="1.5"/>
  <text x="145" y="58" fill="#4FD8A0" font-size="14" text-anchor="middle">label: ready for QA</text>

  <rect x="680" y="30" width="230" height="46" rx="6" fill="#16362B" stroke="#4FD8A0" stroke-width="1.5"/>
  <text x="795" y="58" fill="#4FD8A0" font-size="13" text-anchor="middle">label: ready for QA execution</text>

  <!-- A: Trigger1 -> Reviewer -->
  <line x1="145" y1="76" x2="145" y2="140" stroke="#64857A" stroke-width="2"/>
  <polygon points="145,150 139,140 151,140" fill="#64857A"/>

  <!-- Requirements Reviewer box -->
  <rect x="30" y="150" width="230" height="120" rx="8" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="145" y="180" fill="#E8EDE9" font-size="15" font-weight="700" text-anchor="middle">Requirements</text>
  <text x="145" y="198" fill="#E8EDE9" font-size="15" font-weight="700" text-anchor="middle">Reviewer</text>
  <text x="145" y="222" fill="#9AAAA1" font-size="11" text-anchor="middle">pulls: Google Docs, Slack,</text>
  <text x="145" y="237" fill="#9AAAA1" font-size="11" text-anchor="middle">Figma, Linear spec</text>
  <text x="145" y="255" fill="#9AAAA1" font-size="11" text-anchor="middle">→ consolidated requirement</text>

  <!-- B: Reviewer -> Test Planner -->
  <line x1="260" y1="210" x2="328" y2="210" stroke="#64857A" stroke-width="2"/>
  <polygon points="340,210 328,204 328,216" fill="#64857A"/>

  <!-- Test Planner box -->
  <rect x="340" y="150" width="230" height="120" rx="8" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="455" y="188" fill="#E8EDE9" font-size="15" font-weight="700" text-anchor="middle">Test Planner</text>
  <text x="455" y="216" fill="#9AAAA1" font-size="11" text-anchor="middle">drafts test plan +</text>
  <text x="455" y="231" fill="#9AAAA1" font-size="11" text-anchor="middle">scenarios / cases</text>
  <text x="455" y="250" fill="#9AAAA1" font-size="11" text-anchor="middle">→ posted to ticket</text>

  <!-- C: Test Planner -> Trigger2 (enters from LEFT side, not bottom) -->
  <line x1="570" y1="210" x2="650" y2="210" stroke="#64857A" stroke-width="2"/>
  <line x1="650" y1="210" x2="650" y2="53" stroke="#64857A" stroke-width="2"/>
  <line x1="650" y1="53" x2="672" y2="53" stroke="#64857A" stroke-width="2"/>
  <polygon points="680,53 670,47 670,59" fill="#64857A"/>

  <!-- D: Trigger2 -> split -> Executor & Bug Analyser (exits from BOTTOM only, separate from entry) -->
  <line x1="795" y1="76" x2="795" y2="115" stroke="#64857A" stroke-width="2"/>
  <line x1="692" y1="115" x2="903" y2="115" stroke="#64857A" stroke-width="2"/>
  <line x1="692" y1="115" x2="692" y2="152" stroke="#64857A" stroke-width="2"/>
  <polygon points="692,160 686,150 698,150" fill="#64857A"/>
  <line x1="903" y1="115" x2="903" y2="152" stroke="#64857A" stroke-width="2"/>
  <polygon points="903,160 897,150 909,150" fill="#64857A"/>

  <!-- Executor box (parallel) -->
  <rect x="595" y="160" width="195" height="110" rx="8" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="692" y="192" fill="#E8EDE9" font-size="15" font-weight="700" text-anchor="middle">Executor</text>
  <text x="692" y="218" fill="#9AAAA1" font-size="11" text-anchor="middle">runs test plan across</text>
  <text x="692" y="233" fill="#9AAAA1" font-size="11" text-anchor="middle">lower environments</text>
  <text x="692" y="253" fill="#E0B24D" font-size="10" text-anchor="middle" font-weight="700">runs in parallel →</text>

  <!-- Bug Analyser box (parallel) -->
  <rect x="805" y="160" width="195" height="110" rx="8" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="902" y="192" fill="#E8EDE9" font-size="15" font-weight="700" text-anchor="middle">Bug Analyser</text>
  <text x="902" y="218" fill="#9AAAA1" font-size="11" text-anchor="middle">flags requirement, UI &amp;</text>
  <text x="902" y="233" fill="#9AAAA1" font-size="11" text-anchor="middle">behaviour deviations</text>
  <text x="902" y="253" fill="#E0B24D" font-size="10" text-anchor="middle" font-weight="700">← as execution runs</text>

  <!-- E: Executor & Bug Analyser -> converge -> Status Reporter -->
  <line x1="692" y1="270" x2="692" y2="300" stroke="#64857A" stroke-width="2"/>
  <line x1="903" y1="270" x2="903" y2="300" stroke="#64857A" stroke-width="2"/>
  <line x1="692" y1="300" x2="903" y2="300" stroke="#64857A" stroke-width="2"/>
  <line x1="795" y1="300" x2="795" y2="322" stroke="#64857A" stroke-width="2"/>
  <polygon points="795,330 789,320 801,320" fill="#64857A"/>

  <!-- Status Reporter box -->
  <rect x="680" y="330" width="230" height="110" rx="8" fill="#16362B" stroke="#4FD8A0" stroke-width="1.5"/>
  <text x="795" y="362" fill="#4FD8A0" font-size="16" font-weight="700" text-anchor="middle">Status Reporter</text>
  <text x="795" y="386" fill="#D9E4DC" font-size="11" text-anchor="middle">pass / fail / bugs, mapped</text>
  <text x="795" y="401" fill="#D9E4DC" font-size="11" text-anchor="middle">to requirement lines</text>
  <text x="795" y="422" fill="#D9E4DC" font-size="11" text-anchor="middle">on 100% execution</text>

  <!-- F: Status Reporter -> two outputs -->
  <line x1="740" y1="440" x2="325" y2="495" stroke="#64857A" stroke-width="2"/>
  <polygon points="295,500 305,491 312,502" fill="#64857A"/>
  <line x1="850" y1="440" x2="810" y2="495" stroke="#64857A" stroke-width="2"/>
  <polygon points="795,500 803,490 812,499" fill="#64857A"/>

  <!-- output badges -->
  <rect x="140" y="500" width="310" height="44" rx="6" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="295" y="527" fill="#E8EDE9" font-size="12" text-anchor="middle">Comment + owner tag on Linear ticket</text>

  <rect x="650" y="500" width="310" height="44" rx="6" fill="#151F1B" stroke="#2A3833" stroke-width="1.5"/>
  <text x="805" y="527" fill="#E8EDE9" font-size="12" text-anchor="middle">Update posted to feature Slack channel</text>

</svg>
